<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 380" fill="none" stroke="#000" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
  <!-- Estante base (plataforma inferior) -->
  <rect x="18" y="330" width="344" height="32" rx="6"/>

  <!-- Libro 1: vertical izquierdo -->
  <rect x="30" y="40" width="70" height="292"/>
  <!-- Líneas horizontales del lomo libro 1 -->
  <line x1="30" y1="75" x2="100" y2="75"/>
  <line x1="30" y1="110" x2="100" y2="110"/>

  <!-- Libro 2: vertical centro -->
  <rect x="108" y="30" width="70" height="302"/>
  <!-- Líneas horizontales del lomo libro 2 -->
  <line x1="108" y1="68" x2="178" y2="68"/>
  <line x1="108" y1="104" x2="178" y2="104"/>

  <!-- Libro 3: inclinado hacia la derecha -->
  <!-- Dibujado con transform rotate ~15deg desde esquina inferior derecha -->
  <g transform="rotate(15, 178, 332)">
    <rect x="178" y="60" width="72" height="272"/>
    <!-- Líneas horizontales del lomo libro 3 -->
    <line x1="178" y1="98" x2="250" y2="98"/>
    <line x1="178" y1="132" x2="250" y2="132"/>
  </g>
</svg>
