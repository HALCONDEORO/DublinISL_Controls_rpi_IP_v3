<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 74 74" width="74" height="74">
  <!-- reposabrazos izquierdo — color café -->
  <rect x="0"  y="4"  width="11" height="60" rx="3"
        fill="#8B6340" stroke="#5a3e24" stroke-width="1.2"/>
  <!-- reposabrazos derecho — color café -->
  <rect x="63" y="4"  width="11" height="60" rx="3"
        fill="#8B6340" stroke="#5a3e24" stroke-width="1.2"/>
  <!-- cuerpo principal del cojín -->
  <rect x="11" y="0"  width="52" height="70" rx="5"
        fill="#f0f0f0" stroke="#888" stroke-width="1.2"/>
  <!-- acolchado interior -->
  <rect x="16" y="5"  width="42" height="57" rx="4"
        fill="#e0e0e0" stroke="#aaa" stroke-width="0.7"/>
  <!-- respaldo inferior — color café igual que reposabrazos -->
  <rect x="11" y="62" width="52" height="12" rx="4"
        fill="#8B6340" stroke="#5a3e24" stroke-width="1.2"/>
</svg>
